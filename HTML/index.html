<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LvlUp Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="#tarife">Tarife</a>
    <a href="#jocuri">Jocuri</a>
    <a href="#echipament">Echipament</a>
    <a href="#contact">Contact</a>
  </nav>

  <header class="hero">
    <h1>LvlUp Arena</h1>
    <p>Club PC modern în Chișinău</p>
    <button id="tarifeBtn">Vezi Tarifele</button>
  </header>

  <section id="tarife">
    <h2>Tarife</h2>
    <div class="tarife">
      <div class="card">
        <h3>Budget</h3>
        <p>30 lei / oră</p>
      </div>
      <div class="card">
        <h3>Pro</h3>
        <p>50 lei / oră</p>
      </div>
      <div class="card">
        <h3>Premium</h3>
        <p>70 lei / oră</p>
      </div>
    </div>
  </section>

  <section id="jocuri">
    <h2>Jocuri</h2>
    <p>Descoperă jocurile populare.</p>
  </section>

  <section id="echipament">
    <h2>Echipament</h2>
    <p>Vezi hardware-ul disponibil.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Date de contact și program.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
